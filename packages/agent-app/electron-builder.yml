appId: "com.chat.agent-app"
productName: "Agent App"
copyright: "Copyright © 2026"

directories:
  output: "release"
  buildResources: "assets"

files:
  - "dist/**/*"
  - "assets/**/*"
  - "package.json"

extraResources:
  - from: "assets/"
    to: "assets/"

mac:
  category: "public.app-category.developer-tools"
  icon: "assets/icon.png"
  target:
    - target: "dmg"
      arch:
        - "x64"
        - "arm64"

dmg:
  title: "Agent App"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: "link"
      path: "/Applications"
